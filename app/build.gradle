plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.webviewapp'
    compileSdk 34

    defaultConfig {
        applicationId (System.getenv("PACKAGE_NAME") ?: "com.example.webviewapp")
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        def siteUrl = System.getenv("SITE_URL") ?: "https://example.com"
        def appDisplayName = System.getenv("APP_NAME") ?: "My Web App"

        buildConfigField "String", "TARGET_URL", "\"${siteUrl}\""
        resValue "string", "app_name", appDisplayName
    }

    buildFeatures {
        buildConfig true
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
}
