name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      site_url:
        description: 'Website URL to wrap'
        required: true
        default: 'https://example.com'
      app_name:
        description: 'App display name'
        required: true
        default: 'My Web App'
      package_name:
        description: 'Package name (e.g. com.yourname.appname)'
        required: true
        default: 'com.example.webviewapp'
      permissions:
        description: 'Comma-separated: camera, microphone, location'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.9'

      - name: Generate app icon
        shell: bash
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y imagemagick
          mkdir -p app/src/main/res/mipmap
          ICON_FILE=$(find icon-upload -maxdepth 1 -type f ! -name '.gitkeep' 2>/dev/null | sort | head -n 1)
          if [ -n "$ICON_FILE" ] && convert "$ICON_FILE" -resize 192x192^ -gravity center -extent 192x192 app/src/main/res/mipmap/ic_launcher.png; then
            echo "Using uploaded icon: $ICON_FILE"
          else
            LETTER=$(echo "${APP_NAME:-A}" | LC_ALL=C tr -cd 'A-Za-z' | cut -c1)
            if [ -z "$LETTER" ]; then LETTER="A"; fi
            LETTER=$(echo "$LETTER" | tr '[:lower:]' '[:upper:]')
            convert -size 192x192 xc:'#4A90D9' -gravity center -pointsize 96 -fill white -annotate 0 "$LETTER" app/src/main/res/mipmap/ic_launcher.png
            echo "Using generated fallback icon"
          fi

      - name: Add requested permissions
        shell: bash
        env:
          PERMISSIONS: ${{ github.event.inputs.permissions }}
        run: |
          PERMS=""
          case "$PERMISSIONS" in
            *camera*) PERMS="$PERMS<uses-permission android:name=\"android.permission.CAMERA\" />\n" ;;
          esac
          case "$PERMISSIONS" in
            *microphone*) PERMS="$PERMS<uses-permission android:name=\"android.permission.RECORD_AUDIO\" />\n" ;;
          esac
          case "$PERMISSIONS" in
            *location*) PERMS="$PERMS<uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" />\n<uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\" />\n" ;;
          esac
          if [ -n "$PERMS" ]; then
            printf '%b' "$PERMS" > /tmp/perms.xml
            awk '/<application/{while((getline line < "/tmp/perms.xml")>0) print line}1' app/src/main/AndroidManifest.xml > /tmp/manifest.xml
            mv /tmp/manifest.xml app/src/main/AndroidManifest.xml
          fi

      - name: Build debug APK
        env:
          SITE_URL: ${{ github.event.inputs.site_url }}
          APP_NAME: ${{ github.event.inputs.app_name }}
          PACKAGE_NAME: ${{ github.event.inputs.package_name }}
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
